version: '3.8'

services:
  # ---------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: blacken-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: blacken_admin
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d blacken_admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blacken-network

  # ---------------------------------------------------------------
  # Go Backend API
  # ---------------------------------------------------------------
  backend:
    build:
      context: .
      target: backend-build
    container_name: blacken-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: blacken_admin
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - blacken-network

  # ---------------------------------------------------------------
  # React Frontend (Development mode with Vite)
  # ---------------------------------------------------------------
  frontend:
    build:
      context: .
      target: frontend-build
    container_name: blacken-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    command: npx vite --host --port 5173
    networks:
      - blacken-network

  # ---------------------------------------------------------------
  # Caddy Reverse Proxy
  # ---------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: blacken-caddy
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/usr/share/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "8888:8888"
      - "8443:8443"
    networks:
      - blacken-network

volumes:
  pgdata:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  blacken-network:
    driver: bridge
